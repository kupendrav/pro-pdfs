<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="K-PDF's - Free online PDF tools. Merge, split, compress, convert, rotate, watermark PDFs and more." />
    <meta name="theme-color" content="#dc2626" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>K-PDF's - Online PDF Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-gray-50 text-slate-800 antialiased">
    <!-- Loading Screen (outside root so React doesn't replace it) -->
    <div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;transition:opacity .4s ease">
      <img src="/logo.jpg" alt="K-PDF's" style="width:80px;height:80px;border-radius:16px;margin-bottom:24px;animation:pulse-logo 1.8s ease-in-out infinite;box-shadow:0 0 40px rgba(220,38,38,.3)" />
      <div style="font-family:Inter,system-ui,sans-serif;font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:8px">K-PDF's</div>
      <div style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#9ca3af;margin-bottom:32px">Loading your PDF toolkit...</div>
      <div style="width:200px;height:3px;background:#333;border-radius:4px;overflow:hidden">
        <div style="width:100%;height:100%;background:linear-gradient(90deg,#dc2626,#ef4444,#dc2626);background-size:200% 100%;animation:loader-bar 1.2s ease-in-out infinite;border-radius:4px"></div>
      </div>
    </div>
    <style>
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: .85; }
      }
      @keyframes loader-bar {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
